<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Passport creator</title>
    <style>
        :root {
            --black: #000000;
            --panel: #141414;
            --panel-2: #202020;
            --line: #333333;
            --yellow: #ffb800;
            --silver: #cfcfcf;
            --muted: #9c9c9c;
            --red: #ff4545;
            --green: #4ee06d;
            --radius: 8px;
        }
        * { box-sizing: border-box; }
        html, body { min-height: 100%; background: var(--black); }
        body {
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
        }
        a { color: inherit; }
        h1, h2, h3 { color: var(--yellow); margin: 0; letter-spacing: 0; }
        h1 { font-size: clamp(24px, 5vw, 36px); }
        h2 { font-size: clamp(20px, 4vw, 28px); }
        h3 { font-size: 18px; }
        .container {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: max(16px, env(safe-area-inset-top)) 20px max(18px, env(safe-area-inset-bottom));
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--panel-2);
            padding-bottom: 16px;
        }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .header-actions > * { min-width: 0; }
        .panel {
            background: var(--panel);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 18px;
            border: 1px solid var(--panel-2);
        }
        .stack { display: flex; flex-direction: column; gap: 14px; }
        .row { display: flex; gap: 12px; align-items: center; }
        .hidden { display: none !important; }
        .btn-yellow, .btn-silver, .btn-danger, button.btn-yellow, button.btn-silver, button.btn-danger {
            background: var(--black);
            border: 2px solid currentColor;
            min-height: 48px;
            padding: 12px 18px;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            line-height: 1.15;
            appearance: none;
            -webkit-appearance: none;
        }
        .btn-yellow { color: var(--yellow); }
        .btn-silver { color: var(--silver); }
        .btn-danger { color: var(--red); }
        .btn-yellow:active, .btn-silver:active, .btn-danger:active { background: var(--panel-2); transform: translateY(1px); }
        input[type="text"], input[type="password"], input[type="file"], textarea, select {
            background: var(--panel-2);
            color: #fff;
            border: 1px solid var(--line);
            padding: 13px;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            margin: 0;
        }
        textarea { resize: vertical; line-height: 1.35; }
        .card {
            background: var(--panel);
            border: 1px solid var(--panel-2);
            border-radius: var(--radius);
            padding: 16px;
        }
        .card-button {
            width: 100%;
            background: var(--panel);
            color: #fff;
            border: 1px solid var(--panel-2);
            border-radius: var(--radius);
            padding: 18px;
            text-align: left;
            cursor: pointer;
        }
        .card-button:active, .card-button.selected {
            background: var(--yellow);
            color: #000;
            border-color: var(--yellow);
        }
        .muted { color: var(--muted); }
        .yellow { color: var(--yellow); }
        .danger { color: var(--red); }
        .success { color: var(--green); }
        .doc-link {
            color: var(--silver);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: #0a0a0a;
            overflow-wrap: anywhere;
        }
        .doc-link:active { color: var(--yellow); border-color: var(--yellow); }
        @media (max-width: 768px) {
            html, body { max-width: 100%; overflow-x: hidden; }
            .container { padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom)); }
            .header { flex-direction: column; align-items: stretch; }
            .header-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .header-actions > * { width: 100%; }
            .panel { padding: 16px; }
            .row { flex-direction: column; align-items: stretch; }
            .btn-yellow, .btn-silver, .btn-danger, button.btn-yellow, button.btn-silver, button.btn-danger {
                width: 100%;
                min-height: 54px;
                font-size: 17px;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
